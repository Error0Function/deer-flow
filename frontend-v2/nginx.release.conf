server {
    listen 4173;
    listen [::]:4173;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /v2 {
        return 302 /v2/;
    }

    location ^~ /v2/assets/ {
        try_files $uri =404;
    }

    location ^~ /v2/ {
        try_files $uri $uri/ /v2/index.html;
    }

    location = / {
        return 302 /v2/;
    }
}
